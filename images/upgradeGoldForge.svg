    <radialGradient id="forgeGrad" cx="50%" cy="30%">
      <stop offset="0%" stop-color="var(--primary)" stop-opacity="1"/>
      <stop offset="50%" stop-color="var(--primary)" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" fill="var(--panelSolid)" rx="12"/>
