<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="goldGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="var(--primary)" stop-opacity="1"/>
      <stop offset="50%" stop-color="var(--primary)" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <!-- Gold bar shape -->
  <rect x="24" y="40" width="80" height="48" rx="4" fill="url(#goldGrad)" stroke="var(--primary)" stroke-width="2"/>
  <!-- Top face for 3D effect -->
  <path d="M28 40 L36 28 L92 28 L84 40 Z" fill="var(--primary)" opacity="0.7"/>
  <!-- Side face -->
  <path d="M84 40 L92 28 L92 76 L84 88 Z" fill="var(--primary)" opacity="0.5"/>
  <!-- Shine/highlight -->
  <rect x="32" y="48" width="40" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Stamp mark -->
  <circle cx="80" cy="64" r="10" stroke="var(--primaryText)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <text x="80" y="68" text-anchor="middle" font-size="10" fill="var(--primaryText)" opacity="0.7" font-weight="bold">Au</text>
</svg>
