<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="var(--primary)" rx="12" opacity="0.25"/>
  <!-- Crusher machine body -->
  <rect x="8" y="20" width="48" height="36" fill="var(--primary)" opacity="0.6" rx="4"/>
  <!-- Crusher gears -->
  <circle cx="24" cy="32" r="10" fill="var(--primary)" opacity="0.8"/>
  <circle cx="24" cy="32" r="4" fill="var(--panelSolid)"/>
  <circle cx="40" cy="32" r="8" fill="var(--primary)" opacity="0.8"/>
  <circle cx="40" cy="32" r="3" fill="var(--panelSolid)"/>
  <!-- Gear teeth -->
  <rect x="22" y="18" width="4" height="28" fill="var(--primary)" opacity="0.9"/>
  <rect x="12" y="30" width="24" height="4" fill="var(--primary)" opacity="0.9"/>
  <rect x="32" y="24" width="16" height="3" fill="var(--primary)" opacity="0.9"/>
  <rect x="32" y="37" width="16" height="3" fill="var(--primary)" opacity="0.9"/>
  <!-- Rocks being crushed -->
  <circle cx="32" cy="12" r="5" fill="var(--primaryText)" opacity="0.6"/>
  <circle cx="40" cy="14" r="3" fill="var(--primaryText)" opacity="0.5"/>
</svg>
