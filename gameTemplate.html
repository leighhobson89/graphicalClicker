<div class="trafficSim">
  <header class="trafficHeader">
    <div class="headerLeft">
      <button id="btnMenu" type="button" class="menuBtn" aria-label="Back to menu">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
      </button>
      <h1 class="gameTitle" data-i18n="gameTitle">Traffic Rush</h1>
    </div>
    <div class="trafficControls">
      <button id="btnStart" type="button" class="trafficBtn start">Start</button>
      <button id="btnStop" type="button" class="trafficBtn stop">Stop</button>
      <button id="btnReset" type="button" class="trafficBtn reset">Reset</button>
    </div>
    <div class="headerRight">
      <div class="makeStartControl">
        <label class="checkboxLabel">
          <input type="checkbox" id="makeStartCheckbox">
          <span>Make Start</span>
        </label>
      </div>
      <div class="selectedItemBox" id="selectedItemBox">
        <div class="label">Selected</div>
        <div class="value" id="selectedItemValue">None</div>
      </div>
    </div>
  </header>

  <main class="trafficMain">
    <div class="gridContainer" id="gridContainer">
      <!-- 20x20 grid generated by JavaScript -->
    </div>
    <div class="roadPieceEditor" id="roadPieceEditor">
      <div class="piece horizontal" data-type="horizontal" title="Horizontal Road"></div>
      <div class="piece vertical" data-type="vertical" title="Vertical Road"></div>
      <div class="piece corner-right-up" data-type="corner-right-up" title="Right Corner (Up)"></div>
      <div class="piece corner-right-down" data-type="corner-right-down" title="Right Corner (Down)"></div>
      <div class="piece corner-left-up" data-type="corner-left-up" title="Left Corner (Up)"></div>
      <div class="piece corner-left-down" data-type="corner-left-down" title="Left Corner (Down)"></div>
    </div>
  </main>
</div>
